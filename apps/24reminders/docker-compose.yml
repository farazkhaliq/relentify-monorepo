services:
  web:
    build:
      context: ../../
      dockerfile: apps/24reminders/Dockerfile
    container_name: 24reminders
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    ports:
      - "3024:3000"
    env_file:
      - .env
    networks:
      - infra_default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  infra_default:
    external: true
    name: infra_default
