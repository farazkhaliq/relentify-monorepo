services:
  web:
    container_name: platform
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
    build:
      context: ../../
      dockerfile: apps/platform/Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - ./uploads:/app/apps/platform/uploads
    ports:
      - "3040:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra_default

networks:
  infra_default:
    name: infra_default
    external: true
