services:
  web:
    build:
      context: ../../
      dockerfile: apps/20marketing/Dockerfile
    container_name: 20marketing
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 384M
    env_file:
      - .env
    ports:
      - "127.0.0.1:3020:3000"
    networks:
      - infra_default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  infra_default:
    name: infra_default
    external: true
