services:
  relentify-com2:
    container_name: 20marketing
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    build:
      context: ../../
      dockerfile: apps/20marketing/Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "3020:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra_default

networks:
  infra_default:
    name: infra_default
    external: true
