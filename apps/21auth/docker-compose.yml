services:
  relentify-login:
    container_name: 21auth
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    build:
      context: ../../
      dockerfile: apps/21auth/Dockerfile
    restart: unless-stopped
    ports:
      - "3021:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - .env
    networks:
      - infra_default

networks:
  infra_default:
    name: infra_default
    external: true
