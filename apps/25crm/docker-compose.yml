services:
  web:
    container_name: 25crm
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    build:
      context: ../../
      dockerfile: apps/25crm/Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - /opt/25crm-uploads:/app/uploads
    ports:
      - "3025:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra_default

networks:
  infra_default:
    name: infra_default
    external: true
